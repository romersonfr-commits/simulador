<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Bee DOOH SaaS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

/* LOGIN */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  background:#111;
  color:#fff;
}

#loginBox {
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  width:250px;
}

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:10px;
  background:#FFD600;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* APP */
#app { display:none; height:100vh; }

#menu {
  width:200px;
  background:#111;
  color:#fff;
  padding:10px;
  float:left;
  height:100%;
}

#content {
  margin-left:200px;
  height:100%;
  display:flex;
}

/* MAPA */
#map { width:60%; }

/* PAINEL */
#panel {
  width:40%;
  background:#1a1a1a;
  color:#fff;
  overflow:auto;
  padding:10px;
}

.car {
  background:#222;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

video {
  width:100%;
  height:120px;
  border-radius:8px;
}

/* PIN */
.pulse {
  width:14px;
  height:14px;
  border-radius:50%;
  position:relative;
}
.pulse::after {
  content:'';
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);opacity:.7;}
  100%{transform:scale(3);opacity:0;}
}
.online { background:#00FF88; }
.online::after { background:#00FF88; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h3>Bee DOOH</h3>
    <input id="user" placeholder="Usuário"/>
    <input id="pass" type="password" placeholder="Senha"/>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="menu">
    <button onclick="mostrar('mapa')">🚗 Operação</button>
    <button onclick="mostrar('ads')">📢 Campanhas</button>
  </div>

  <div id="content">

    <!-- MAPA -->
    <div id="mapaView" style="display:flex;width:100%;">
      <div id="map"></div>
      <div id="panel"></div>
    </div>

    <!-- ADS -->
    <div id="adsView" style="display:none;padding:20px;width:100%;">
      <h2>Campanhas</h2>

      <input id="nomeAd" placeholder="Nome campanha"/>
      <input id="bairroAd" placeholder="Bairro"/>
      <input id="videoAd" placeholder="URL vídeo"/>

      <button onclick="salvarAd()">Salvar</button>

      <h3>Minhas campanhas</h3>
      <div id="listaAds"></div>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>

// LOGIN SIMPLES
let usuarioAtual = null;

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u && p){
    usuarioAtual = u;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    iniciar();
  }
}

// TROCA VIEW
function mostrar(v){
  document.getElementById("mapaView").style.display = v==="mapa"?"flex":"none";
  document.getElementById("adsView").style.display = v==="ads"?"block":"none";
  listarAds();
}

// STORAGE
function getAds(){
  return JSON.parse(localStorage.getItem("ads")||"[]");
}

function salvarAd(){
  const ads = getAds();

  ads.push({
    usuario:usuarioAtual,
    nome:document.getElementById("nomeAd").value,
    bairro:document.getElementById("bairroAd").value,
    video:document.getElementById("videoAd").value
  });

  localStorage.setItem("ads", JSON.stringify(ads));
  listarAds();
}

function listarAds(){
  const lista = document.getElementById("listaAds");
  lista.innerHTML = "";

  getAds()
    .filter(a=>a.usuario===usuarioAtual)
    .forEach(a=>{
      lista.innerHTML += `<div>${a.nome} - ${a.bairro}</div>`;
    });
}

// MAPA + FROTA
function iniciar(){

  const map = L.map('map').setView([-29.754,-51.149],13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

  function pin(){
    return L.divIcon({
      html:`<div class="pulse online"></div>`,
      className:'',
      iconSize:[14,14]
    });
  }

  const carros = [];
  const markers = {};
  const panel = document.getElementById("panel");

  for(let i=1;i<=5;i++){
    carros.push({
      id:"Carro "+i,
      lat:-29.754+(Math.random()-0.5)*0.02,
      lng:-51.149+(Math.random()-0.5)*0.02,
      videoAtual:""
    });
  }

  carros.forEach(c=>{

    const marker = L.marker([c.lat,c.lng],{icon:pin()}).addTo(map);
    markers[c.id]=marker;

    const div = document.createElement("div");
    div.className="car";
    div.innerHTML=`
      <b>${c.id}</b>
      <video id="vid${c.id}" autoplay muted loop></video>
      <div id="info${c.id}">-</div>
    `;

    panel.appendChild(div);
  });

  const bairros = ["Centro","Feitoria","Scharlau"];

  setInterval(()=>{

    const ads = getAds();

    carros.forEach(c=>{

      c.lat += (Math.random()-0.5)*0.002;
      c.lng += (Math.random()-0.5)*0.002;

      markers[c.id].setLatLng([c.lat,c.lng]);

      const bairro = bairros[Math.floor(Math.random()*bairros.length)];

      // filtrar anúncios do usuário OU todos se admin
      let listaAds = ads;

      if(usuarioAtual !== "admin"){
        listaAds = ads.filter(a=>a.usuario===usuarioAtual);
      }

      const anuncio = listaAds.find(a=>a.bairro.toLowerCase()===bairro.toLowerCase());

      const vid = document.getElementById("vid"+c.id);

      if(anuncio){
        document.getElementById("info"+c.id).innerHTML =
          bairro+" - "+anuncio.nome;

        if(anuncio.video !== c.videoAtual){
          vid.src = anuncio.video;
          vid.play();
          c.videoAtual = anuncio.video;
        }
      }

    });

  },3000);

}

</script>

</body>
</html>
