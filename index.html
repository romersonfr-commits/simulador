<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bee DOOH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: #fff;
    }

    /* TOPO CLEAN */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #111;
      font-size: 12px;
      border-bottom: 1px solid #222;
    }

    .logo {
      color: #FFD600;
      font-weight: bold;
    }

    #stats {
      display: flex;
      gap: 15px;
    }

    .stat {
      text-align: center;
      font-size: 11px;
    }

    .stat span {
      display: block;
      font-size: 13px;
      color: #FFD600;
      font-weight: bold;
    }

    #map {
      height: 92vh;
    }

    /* ÍCONE ROTACIONÁVEL */
    .car-icon {
      width: 28px;
      height: 28px;
      transition: transform 0.5s linear;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🐝 Bee</div>
  <div id="stats">
    <div class="stat">On<span id="online">0</span></div>
    <div class="stat">Off<span id="offline">0</span></div>
    <div class="stat">Min<span id="tempo">0</span></div>
  </div>
</header>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// FUNÇÃO PARA GERAR ÍCONE
function criarIcone(cor, angulo) {
  return L.divIcon({
    className: '',
    html: `
      <img 
        src="https://cdn-icons-png.flaticon.com/512/744/744465.png"
        class="car-icon"
        style="
          transform: rotate(${angulo}deg);
          filter: ${cor === 'green' ? 'hue-rotate(90deg)' : 'hue-rotate(0deg)'};
        "
      />
    `,
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
}

// CARROS
const carros = [];
const markers = {};

for (let i = 1; i <= 10; i++) {
  carros.push({
    id: "carro" + i,
    lat: -29.754 + (Math.random() - 0.5) * 0.02,
    lng: -51.149 + (Math.random() - 0.5) * 0.02,
    online: true,
    tempoAtivo: 0,
    angulo: 0
  });
}

// CRIAR MARKERS
carros.forEach(carro => {
  const marker = L.marker([carro.lat, carro.lng], {
    icon: criarIcone("green", 0)
  }).addTo(map);

  markers[carro.id] = marker;
});

// CALCULAR DIREÇÃO
function calcularAngulo(lat1, lng1, lat2, lng2) {
  const dy = lat2 - lat1;
  const dx = lng2 - lng1;
  return Math.atan2(dy, dx) * (180 / Math.PI);
}

// LOOP
setInterval(() => {

  let onlineCount = 0;
  let offlineCount = 0;
  let totalTempo = 0;

  carros.forEach(carro => {

    const oldLat = carro.lat;
    const oldLng = carro.lng;

    // movimento
    carro.lat += (Math.random() - 0.5) * 0.001;
    carro.lng += (Math.random() - 0.5) * 0.001;

    // calcular direção
    carro.angulo = calcularAngulo(oldLat, oldLng, carro.lat, carro.lng);

    // status
    if (Math.random() < 0.03) {
      carro.online = !carro.online;
    }

    if (carro.online) {
      carro.tempoAtivo += 5;
      onlineCount++;
    } else {
      offlineCount++;
    }

    totalTempo += carro.tempoAtivo;

    const marker = markers[carro.id];

    marker.setLatLng([carro.lat, carro.lng]);

    // atualizar ícone
    marker.setIcon(
      criarIcone(carro.online ? "green" : "red", carro.angulo)
    );

    const status = carro.online ? "🟢 Online" : "🔴 Offline";

    marker.bindPopup(`
      <b>${carro.id}</b><br>
      ${status}<br>
      ⏱️ ${Math.floor(carro.tempoAtivo/60)} min
    `);

  });

  // atualizar topo
  document.getElementById("online").innerText = onlineCount;
  document.getElementById("offline").innerText = offlineCount;
  document.getElementById("tempo").innerText =
    Math.floor((totalTempo / carros.length) / 60);

}, 5000);

</script>

</body>
</html>
