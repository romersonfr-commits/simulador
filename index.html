<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Bee DOOH Frota</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
}

/* MAPA */
#map { width:60%; height:100vh; }

/* PAINEL */
#panel {
  width:40%;
  background:#111;
  color:#fff;
  padding:10px;
  overflow:auto;
}

.logo {
  color:#FFD600;
  font-weight:bold;
  font-size:18px;
  margin-bottom:10px;
}

/* CARDS */
.car {
  background:#1a1a1a;
  border-radius:10px;
  margin-bottom:10px;
  padding:10px;
}

.car video {
  width:100%;
  height:120px;
  border-radius:8px;
  object-fit:cover;
}

.info {
  font-size:12px;
  margin-top:5px;
}

.info span {
  color:#FFD600;
}

/* PIN */
.pulse {
  width:14px;
  height:14px;
  border-radius:50%;
  position:relative;
}
.pulse::after {
  content:'';
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);opacity:.7;}
  100%{transform:scale(3);opacity:0;}
}
.online { background:#00FF88; }
.online::after { background:#00FF88; }

</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="logo">🐝 Bee DOOH Frota</div>
  <div id="cars"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ZONAS
const zonas = [
  {
    nome:"Centro",
    anuncio:"Farmácia",
    video:"https://cdn.coverr.co/videos/coverr-shopping-in-the-city-5176/1080p.mp4",
    coords:[[-29.75,-51.16],[-29.75,-51.14],[-29.76,-51.14],[-29.76,-51.16]]
  },
  {
    nome:"Feitoria",
    anuncio:"Supermercado",
    video:"https://cdn.coverr.co/videos/coverr-people-shopping-in-a-supermarket-4983/1080p.mp4",
    coords:[[-29.76,-51.16],[-29.76,-51.14],[-29.78,-51.14],[-29.78,-51.16]]
  },
  {
    nome:"Scharlau",
    anuncio:"Oficina",
    video:"https://cdn.coverr.co/videos/coverr-mechanic-working-1602/1080p.mp4",
    coords:[[-29.74,-51.14],[-29.74,-51.12],[-29.76,-51.12],[-29.76,-51.14]]
  }
];

// desenhar zonas
zonas.forEach(z=>{
  L.polygon(z.coords,{color:"#FFD600", fillOpacity:0.05}).addTo(map);
});

// PIN
function pin(){
  return L.divIcon({
    html:`<div class="pulse online"></div>`,
    className:'',
    iconSize:[14,14]
  });
}

// DETECÇÃO
function dentro(p, vs){
  let x=p[0], y=p[1], inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];
    let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

// CRIAR CARROS
const carros = [];
const markers = {};

for(let i=1;i<=8;i++){
  carros.push({
    id:"Carro "+i,
    lat:-29.754+(Math.random()-0.5)*0.02,
    lng:-51.149+(Math.random()-0.5)*0.02,
    step:0,
    videoAtual:""
  });
}

// HTML dos carros
const carsDiv = document.getElementById("cars");

carros.forEach(c=>{

  // marker
  const marker = L.marker([c.lat,c.lng],{icon:pin()}).addTo(map);
  markers[c.id] = marker;

  // criar card
  const div = document.createElement("div");
  div.className="car";

  div.innerHTML = `
    <b>${c.id}</b>
    <video id="vid${c.id}" autoplay muted loop></video>
    <div class="info">
      Bairro: <span id="b${c.id}">-</span><br>
      Anúncio: <span id="a${c.id}">-</span>
    </div>
  `;

  carsDiv.appendChild(div);

});

// LOOP
setInterval(()=>{

  carros.forEach(c=>{

    // movimento aleatório
    c.lat += (Math.random()-0.5)*0.002;
    c.lng += (Math.random()-0.5)*0.002;

    markers[c.id].setLatLng([c.lat,c.lng]);

    let bairro="-", anuncio="-", video="";

    zonas.forEach(z=>{
      if(dentro([c.lat,c.lng], z.coords)){
        bairro=z.nome;
        anuncio=z.anuncio;
        video=z.video;
      }
    });

    document.getElementById("b"+c.id).innerText=bairro;
    document.getElementById("a"+c.id).innerText=anuncio;

    const vid = document.getElementById("vid"+c.id);

    if(video && video !== c.videoAtual){
      vid.src = video;
      vid.play();
      c.videoAtual = video;
    }

  });

},3000);

</script>

</body>
</html>
