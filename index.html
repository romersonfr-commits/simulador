<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Bee DOOH PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
}

/* MAPA */
#map { width:70%; height:100vh; }

/* PAINEL */
#panel {
  width:30%;
  background:#111;
  color:#fff;
  padding:15px;
}

.logo {
  color:#FFD600;
  font-weight:bold;
  font-size:18px;
  margin-bottom:20px;
}

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.card span {
  color:#FFD600;
  font-size:18px;
  display:block;
}

/* PIN */
.pulse {
  width:14px;
  height:14px;
  border-radius:50%;
  position:relative;
}
.pulse::after {
  content:'';
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);opacity:.7;}
  100%{transform:scale(3);opacity:0;}
}

.online { background:#00FF88; }
.online::after { background:#00FF88; }

.offline { background:#FF3B3B; }
.offline::after { background:#FF3B3B; }

/* BOTÕES */
button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#FFD600;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="logo">🐝 Bee DOOH</div>

  <div class="card">Online<span id="online">0</span></div>
  <div class="card">Offline<span id="offline">0</span></div>
  <div class="card">Bairro Atual<span id="bairro">-</span></div>
  <div class="card">Anúncio<span id="anuncio">-</span></div>

  <button onclick="modoDemo()">🎮 Modo Apresentação</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// BAIRROS (ZONAS)
const zonas = [
  {
    nome:"Centro",
    anuncio:"Farmácia São João",
    coords:[[-29.75,-51.16],[-29.75,-51.14],[-29.76,-51.14],[-29.76,-51.16]]
  },
  {
    nome:"Feitoria",
    anuncio:"Supermercado Econômico",
    coords:[[-29.76,-51.16],[-29.76,-51.14],[-29.78,-51.14],[-29.78,-51.16]]
  },
  {
    nome:"Scharlau",
    anuncio:"Oficina do João",
    coords:[[-29.74,-51.14],[-29.74,-51.12],[-29.76,-51.12],[-29.76,-51.14]]
  }
];

// DESENHAR ZONAS
zonas.forEach(z=>{
  L.polygon(z.coords,{
    color:"#FFD600",
    fillOpacity:0.05
  }).addTo(map).bindPopup(z.nome);
});

// CRIAR PIN
function pin(status){
  return L.divIcon({
    html:`<div class="pulse ${status}"></div>`,
    className:'',
    iconSize:[14,14]
  });
}

// CARRO (1 principal pra demo)
let carro = {
  lat:-29.754,
  lng:-51.149,
  online:true,
  step:0
};

const rota = [
  [-29.754,-51.149],
  [-29.758,-51.150],
  [-29.765,-51.150],
  [-29.770,-51.150],
  [-29.755,-51.135]
];

const marker = L.marker([carro.lat,carro.lng],{
  icon:pin("online")
}).addTo(map);

// DETECTAR BAIRRO
function dentroPoligono(ponto, vs){
  let x=ponto[0], y=ponto[1];
  let inside=false;

  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect = ((yi>y)!=(yj>y)) &&
      (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

// LOOP
setInterval(()=>{

  // mover
  carro.step = (carro.step+1)%rota.length;
  carro.lat = rota[carro.step][0];
  carro.lng = rota[carro.step][1];

  marker.setLatLng([carro.lat,carro.lng]);

  // detectar zona
  let bairroAtual = "Fora de zona";
  let anuncioAtual = "-";

  zonas.forEach(z=>{
    if(dentroPoligono([carro.lat,carro.lng], z.coords)){
      bairroAtual = z.nome;
      anuncioAtual = z.anuncio;
    }
  });

  document.getElementById("bairro").innerText = bairroAtual;
  document.getElementById("anuncio").innerText = anuncioAtual;

},3000);

// MODO DEMO
function modoDemo(){
  alert("Simulação iniciada: observe o carro mudando de bairro e anúncios.");
}

</script>

</body>
</html>
