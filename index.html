<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bee DOOH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #111;
      font-size: 12px;
      border-bottom: 1px solid #222;
    }

    .logo {
      color: #FFD600;
      font-weight: bold;
    }

    #stats {
      display: flex;
      gap: 15px;
    }

    .stat {
      text-align: center;
      font-size: 11px;
    }

    .stat span {
      display: block;
      font-size: 13px;
      color: #FFD600;
      font-weight: bold;
    }

    #map {
      height: 92vh;
    }

    .pin {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      border: 2px solid #fff;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🐝 Bee</div>
  <div id="stats">
    <div class="stat">On<span id="online">0</span></div>
    <div class="stat">Off<span id="offline">0</span></div>
    <div class="stat">Min<span id="tempo">0</span></div>
  </div>
</header>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// MAPA MAIS MODERNO (Carto)
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & Carto'
}).addTo(map);

// CRIAR PIN MODERNO
function criarPin(cor) {
  return L.divIcon({
    className: '',
    html: `<div class="pin" style="background:${cor}"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

// CARROS (simulação)
const carros = [];
const markers = {};
const trilhas = {};

for (let i = 1; i <= 10; i++) {
  carros.push({
    id: "carro" + i,
    lat: -29.754 + (Math.random() - 0.5) * 0.02,
    lng: -51.149 + (Math.random() - 0.5) * 0.02,
    online: true,
    tempoAtivo: 0,
    path: []
  });
}

// CRIAR ELEMENTOS
carros.forEach(carro => {

  const marker = L.marker([carro.lat, carro.lng], {
    icon: criarPin("#00FF88")
  }).addTo(map);

  const linha = L.polyline([], {
    color: "#FFD600",
    weight: 3,
    opacity: 0.7
  }).addTo(map);

  markers[carro.id] = marker;
  trilhas[carro.id] = linha;
});

// LOOP
setInterval(() => {

  let onlineCount = 0;
  let offlineCount = 0;
  let totalTempo = 0;

  carros.forEach(carro => {

    // movimento
    carro.lat += (Math.random() - 0.5) * 0.001;
    carro.lng += (Math.random() - 0.5) * 0.001;

    // status
    if (Math.random() < 0.03) {
      carro.online = !carro.online;
    }

    if (carro.online) {
      carro.tempoAtivo += 5;
      onlineCount++;
    } else {
      offlineCount++;
    }

    totalTempo += carro.tempoAtivo;

    // atualizar marker
    const marker = markers[carro.id];
    marker.setLatLng([carro.lat, carro.lng]);

    marker.setIcon(
      criarPin(carro.online ? "#00FF88" : "#FF3B3B")
    );

    // rastro
    carro.path.push([carro.lat, carro.lng]);

    if (carro.path.length > 20) {
      carro.path.shift();
    }

    trilhas[carro.id].setLatLngs(carro.path);

    const status = carro.online ? "🟢 Online" : "🔴 Offline";

    marker.bindPopup(`
      <b>${carro.id}</b><br>
      ${status}<br>
      ⏱️ ${Math.floor(carro.tempoAtivo/60)} min
    `);

  });

  // atualizar topo
  document.getElementById("online").innerText = onlineCount;
  document.getElementById("offline").innerText = offlineCount;
  document.getElementById("tempo").innerText =
    Math.floor((totalTempo / carros.length) / 60);

}, 5000);

</script>

</body>
</html>
