<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bee DOOH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

  <!-- Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #0b0b0b;
      color: #fff;
    }

    #map {
      height: 100vh;
      width: 75%;
    }

    /* PAINEL */
    #panel {
      width: 25%;
      background: #111;
      padding: 15px;
      border-left: 1px solid #222;
    }

    .logo {
      color: #FFD600;
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .card {
      background: #1a1a1a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .card span {
      display: block;
      color: #FFD600;
      font-size: 18px;
      font-weight: bold;
    }

    /* PIN PULSANTE */
    .pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      position: relative;
    }

    .pulse::after {
      content: '';
      width: 14px;
      height: 14px;
      position: absolute;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      opacity: 0.6;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(3); opacity: 0; }
    }

    .online {
      background: #00FF88;
    }

    .online::after {
      background: #00FF88;
    }

    .offline {
      background: #FF3B3B;
    }

    .offline::after {
      background: #FF3B3B;
    }

  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="logo">🐝 Bee DOOH</div>

  <div class="card">Online<span id="online">0</span></div>
  <div class="card">Offline<span id="offline">0</span></div>
  <div class="card">Tempo médio<span id="tempo">0</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
// MAPA MODERNO
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// CLUSTER
const cluster = L.markerClusterGroup();
map.addLayer(cluster);

// PIN
function criarPin(status) {
  return L.divIcon({
    className: '',
    html: `<div class="pulse ${status}"></div>`,
    iconSize: [14,14],
    iconAnchor: [7,7]
  });
}

// BAIRROS (simples exemplo)
const bairros = [
  {nome:"Centro", lat:-29.754, lng:-51.149},
  {nome:"Feitoria", lat:-29.770, lng:-51.150},
  {nome:"Scharlau", lat:-29.740, lng:-51.130}
];

bairros.forEach(b => {
  L.marker([b.lat, b.lng], {
    icon: L.divIcon({
      html:`<div style="font-size:12px;color:#555;">${b.nome}</div>`
    })
  }).addTo(map);
});

// CARROS
const carros = [];
const markers = {};
const trilhas = {};

for (let i = 1; i <= 20; i++) {
  carros.push({
    id: "carro"+i,
    lat: -29.754 + (Math.random()-0.5)*0.02,
    lng: -51.149 + (Math.random()-0.5)*0.02,
    online: true,
    tempoAtivo: 0,
    path: []
  });
}

// CRIAR
carros.forEach(c => {

  const marker = L.marker([c.lat, c.lng], {
    icon: criarPin("online")
  });

  cluster.addLayer(marker);

  const linha = L.polyline([], {
    color: "#FFD600",
    weight: 2
  }).addTo(map);

  markers[c.id] = marker;
  trilhas[c.id] = linha;
});

// LOOP
setInterval(()=>{

  let online=0, offline=0, tempoTotal=0;

  carros.forEach(c=>{

    c.lat += (Math.random()-0.5)*0.001;
    c.lng += (Math.random()-0.5)*0.001;

    if(Math.random()<0.03) c.online=!c.online;

    if(c.online){ c.tempoAtivo+=5; online++; }
    else offline++;

    tempoTotal += c.tempoAtivo;

    const marker = markers[c.id];

    marker.setLatLng([c.lat,c.lng]);
    marker.setIcon(criarPin(c.online?"online":"offline"));

    c.path.push([c.lat,c.lng]);
    if(c.path.length>20) c.path.shift();

    trilhas[c.id].setLatLngs(c.path);

  });

  document.getElementById("online").innerText=online;
  document.getElementById("offline").innerText=offline;
  document.getElementById("tempo").innerText=Math.floor((tempoTotal/carros.length)/60);

},5000);

</script>

</body>
</html>
