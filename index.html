<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Bee DOOH Vídeo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
}

/* MAPA */
#map { width:65%; height:100vh; }

/* PAINEL */
#panel {
  width:35%;
  background:#111;
  color:#fff;
  padding:15px;
}

.logo {
  color:#FFD600;
  font-weight:bold;
  font-size:18px;
  margin-bottom:15px;
}

/* TELA DO CARRO */
#playerBox {
  background:#000;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:15px;
  border:2px solid #222;
}

video {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* INFO */
.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.card span {
  color:#FFD600;
  display:block;
  font-size:16px;
}

/* PIN */
.pulse {
  width:14px;
  height:14px;
  border-radius:50%;
  position:relative;
}
.pulse::after {
  content:'';
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);opacity:.7;}
  100%{transform:scale(3);opacity:0;}
}
.online { background:#00FF88; }
.online::after { background:#00FF88; }

</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="logo">🐝 Bee DOOH</div>

  <div id="playerBox">
    <video id="player" autoplay muted loop></video>
  </div>

  <div class="card">Bairro<span id="bairro">-</span></div>
  <div class="card">Anúncio<span id="anuncio">-</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-29.754, -51.149], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ZONAS + VÍDEOS
const zonas = [
  {
    nome:"Centro",
    anuncio:"Farmácia",
    video:"https://cdn.coverr.co/videos/coverr-shopping-in-the-city-5176/1080p.mp4",
    coords:[[-29.75,-51.16],[-29.75,-51.14],[-29.76,-51.14],[-29.76,-51.16]]
  },
  {
    nome:"Feitoria",
    anuncio:"Supermercado",
    video:"https://cdn.coverr.co/videos/coverr-people-shopping-in-a-supermarket-4983/1080p.mp4",
    coords:[[-29.76,-51.16],[-29.76,-51.14],[-29.78,-51.14],[-29.78,-51.16]]
  },
  {
    nome:"Scharlau",
    anuncio:"Oficina",
    video:"https://cdn.coverr.co/videos/coverr-mechanic-working-1602/1080p.mp4",
    coords:[[-29.74,-51.14],[-29.74,-51.12],[-29.76,-51.12],[-29.76,-51.14]]
  }
];

// desenhar zonas
zonas.forEach(z=>{
  L.polygon(z.coords,{color:"#FFD600", fillOpacity:0.05}).addTo(map);
});

// pin
function pin(){
  return L.divIcon({
    html:`<div class="pulse online"></div>`,
    className:'',
    iconSize:[14,14]
  });
}

// carro
let carro = {
  lat:-29.754,
  lng:-51.149,
  step:0
};

const rota = [
  [-29.754,-51.149],
  [-29.758,-51.150],
  [-29.765,-51.150],
  [-29.770,-51.150],
  [-29.755,-51.135]
];

const marker = L.marker([carro.lat,carro.lng],{icon:pin()}).addTo(map);

// detectar poligono
function dentro(p, vs){
  let x=p[0], y=p[1], inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];
    let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

// player
const player = document.getElementById("player");
let videoAtual = "";

// LOOP
setInterval(()=>{

  carro.step = (carro.step+1)%rota.length;
  carro.lat = rota[carro.step][0];
  carro.lng = rota[carro.step][1];

  marker.setLatLng([carro.lat,carro.lng]);

  let bairro="-", anuncio="-", video="";

  zonas.forEach(z=>{
    if(dentro([carro.lat,carro.lng], z.coords)){
      bairro = z.nome;
      anuncio = z.anuncio;
      video = z.video;
    }
  });

  document.getElementById("bairro").innerText = bairro;
  document.getElementById("anuncio").innerText = anuncio;

  // trocar vídeo
  if(video && video !== videoAtual){
    player.src = video;
    player.play();
    videoAtual = video;
  }

},3000);

</script>

</body>
</html>
